<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Hosiii ❤️</title>
<style>
body{margin:0;font-family:Tahoma,sans-serif;background:linear-gradient(180deg,#ffffff,#ffeaea,#fff5f5);overflow-x:hidden;color:#8b0000}
.screen{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:24px;text-align:center}
.active{display:flex}
h1{font-size:2.1rem}h2{margin:.4em 0}
.btn{background:#e53935;color:#fff;border:0;padding:14px 24px;border-radius:35px;font-size:1rem;font-weight:bold;cursor:pointer;margin:8px;box-shadow:0 8px 20px rgba(229,57,53,.35);transition:.3s}
.btn:hover{background:#c62828;transform:scale(1.05)}
.answers button{
display:block;
width:min(320px,90vw);
margin:12px auto;
padding:14px;
border-radius:30px;
border:2px solid #ffb3b3;
background:#fff;
color:#c62828;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 4px 12px rgba(255,0,0,.15);
}

.answers button:hover{
background:#ffe5e5;
transform:scale(1.03);
}
#msg{color:#b00020;height:24px}
textarea{width:min(700px,95vw);height:220px;border-radius:18px;border:2px solid #ffb3b3;padding:15px}
video{width:min(700px,95vw);border-radius:18px;display:none}
.flowers{position:fixed;inset:0;pointer-events:none}
.fl{position:absolute;font-size:22px;animation:f 10s linear infinite}
@keyframes f{from{transform:translateY(-10vh)}to{transform:translateY(110vh) translateX(40px)}}
.heart{position:fixed;font-size:22px;animation:up 4s linear forwards}
@keyframes up{from{transform:translateY(0);opacity:1}to{transform:translateY(-120vh);opacity:0}}
#confetti{position:fixed;inset:0;pointer-events:none}
svg{max-width:320px}
</style>
</head>
<body>
<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
<div class="flowers"></div>
<canvas id="confetti"></canvas>

<section id="start" class="screen active">
<h1>Happy Birthday Koky ❤️🎂</h1>
<h2>To My Favorite Person ❤️</h2>
<button class="btn" onclick="nextQ()">❤️ Start The Surprise ❤️</button>
</section>

<section id="quiz" class="screen">
<h2 id="q"></h2>
<div class="answers" id="a"></div>
<div id="msg"></div>
</section>

<section id="done" class="screen">
<h2>❤️ Congratulations, Hoso! ❤️</h2>
<p>You answered every question correctly! 🥹❤️<br>Now it's time for your surprise... 🎁❤️</p>
<button class="btn" onclick="showMessage()">💌 Open My Letter</button>
</section>

<section id="message" class="screen">
<h2>❤️ To The Closest Person To My Heart ❤️</h2>
<textarea readonly>
  
كل سنة وانت طيب يا أحلى حوسي في العالم ❤️‍🩹❤️‍🩹 احم احم 😂 عمتًا مش عارفة أبدأ إزاي ولا أقول إيه بتكسفف بس هحاول يعني، بس عايزة أقولك بجد أنا مبسوطة إن عندي حد زيك في حياتي، وأحلى من بيكبر سنة وسنين عمرك كلها فرحان، وأشوفك كدا في فرحك ها ها يا حجرة 🥹😂 يمكن أنت متعرفش بس وجودك بيفرق معايا، أوي كلامك وهزارك وطريقتك وكل حاجة صغيرة بتعملها ليا علشان تفرحني بتخليني أسعد واحدة، والله أنا محظوظة إنك في حياتي، وبنرخم على بعض 😂.

أنت أحلى مصدومصق في الدنيا كلها، وصاحبي الوحيد اللي بحب أتكلم معاه وأحكيله وأضحك معاه، وأكون عبيطة وطفلة وهبلة، وبكل حالاتي معاه ❤️‍🩹.

شكرًا إنك موجود معايا، شكرًا على كل مرة بتحاول تضحكني فيها، ولما يكون نفسيتي وحشة بتكون معايا أكتر من نفسي، وشكرًا بجد على كل مرة كنت جنبي فيها، وكل لحظة حلوة فرحتني بسببك.

يارب السنة الجديدة دي تكون حلوة عليك، وتحقق كل اللي نفسك فيه، وأشوفك أحسن وأنجح مستشار في كورة الأرضية 😂، وتفضل دايمًا مبسوط وناجح في حاجات كتيرة أنت بتحبها.

وخليك فاكر إنك أكتر شخص غالي عندي، وعلى قلبي أوي يا حوسو، بحبك يا حوسحوس ❤️🥺.

الأغنية دي بقى تستاهل كل كلمة فيها. 🥹❤️‍🩹
  
</textarea>
<button class="btn" onclick="showVideo()">🎥 Open The Video</button>
<video id="vid" controls>
<source src="hoso.mp4" type="video/mp4">
</video>
<br><br>
<svg viewBox="0 0 220 220">
<circle cx="70" cy="50" r="20" fill="#f5d0c5"/><circle cx="150" cy="50" r="20" fill="#f5d0c5"/>
<path d="M55 75 q15 40 55 60 q40-20 55-60" fill="#d9b3ff"/>
<path d="M75 70 q35 40 70 0" stroke="#c084fc" stroke-width="10" fill="none"/>
<text x="20" y="190" font-size="18">🌹🌸🌷</text>
</svg>
<p><b>Happy Birthday, My Favorite Person ❤️🥹</b></p>
</section>

<script>
const qs=[
["أكتر حاجة بتحبها إيه يا حوسو؟ 🥹❤️",
["🍕 الأكل","😴 النوم","❤️ دي إنتِ أكتر حاجة بحبها"],2],
["لو أنا زعلت منك إيه اللي بيحصل؟ 🥺❤️",
["😒 يقول فكك مني","🙄 يقول متتكلميش معايا","😭 يقول بكرهك","❤️😂 بتقولي هرنك علقة"],3],
["هنفضل مع بعض قد إيه يا حوسحوس؟ 🥹❤️",
["😂 أسبوع وخلاص","☹️ لما أزهق","❤️ طول العمر إن شاء الله"],2],
["أنا بالنسبالك إيه؟ 🥹❤️",
["😂 هم كبير","🙂 واحدة من اللي أعرفهم","❤️🥹 أحلى وأجمل وأطعم وأفرفش واحدة"],2],
["جاهز للمفاجأة يا حوسحوس؟ 🎁❤️",
["🥺 لأ مش جاهز","😂 مش فاضي","❤️🥹 أكيد يا نونايه"],2]
];
let i=0;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function nextQ(){show('quiz');render()}
function render(){
q.textContent=qs[i][0];a.innerHTML='';msg.textContent='';
qs[i][1].forEach((t,n)=>{let b=document.createElement('button');b.textContent=t;b.onclick=()=>pick(n);a.appendChild(b)})
}
function pick(n){
if(n===qs[i][2]){i++; if(i<qs.length)render(); else finish();}
else msg.textContent="Nice try 😂❤️ But try again.";
}
function finish(){
    show('done');
    confetti();
    hearts();

    setTimeout(()=>{
        document.querySelectorAll('.f1,.f2').forEach(e=>e.remove());
        const c = document.getElementById('confetti');
        if(c) c.style.display = 'none';
    },4000);
}
function showMessage(){show('message')}
function showVideo(){
document.getElementById('vid').style.display='block';
document.getElementById('music').pause();
document.getElementById('vid').play().catch(()=>{});
}
for(let k=0;k<24;k++){
let s=document.createElement('div');
s.className='fl';
s.textContent=["🎈","❤️","🤍"][k%3];
s.style.left=Math.random()*100+"%";
s.style.animationDelay=Math.random()*10+"s";
document.querySelector('.flowers').appendChild(s);
}
function hearts(){for(let i=0;i<50;i++)setTimeout(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤️';h.style.left=Math.random()*100+'vw';h.style.bottom='-30px';document.body.appendChild(h);setTimeout(()=>h.remove(),4000)},i*80)}
function confetti(){
const c=document.getElementById('confetti'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let p=[];for(let i=0;i<180;i++)p.push({x:Math.random()*c.width,y:Math.random()*-c.height,r:2+Math.random()*4,v:2+Math.random()*4,c:["#ff2d55","#ff4d4d","#ffffff"][Math.floor(Math.random()*3)]
let f=0;(function anim(){x.clearRect(0,0,c.width,c.height);p.forEach(o=>{x.fillStyle=o.c;x.fillRect(o.x,o.y,o.r,o.r*3);o.y+=o.v;if(o.y>c.height)o.y=-20;});if(f++<350)requestAnimationFrame(anim);})();
}
</script>
</body></html>
